# IX Forge device profile — AULA F108 Pro
#
# RGB is DECODED and PROVEN on hardware (per-key control via forge-cli). The full
# 104-key led_index map below was mapped empirically (see docs/protocols/
# aula-f108-pro.md). Macro/LCD sections are still TODO pending their own captures.
#
# IMPORTANT: the F108 Pro is tri-mode (BT / 2.4GHz / USB-C) but its official
# software is Windows + WIRED-ONLY. Capture and configure over USB-C wired.

schema_version = 1
id = "aula.f108-pro"
display_name = "AULA F108 Pro"
vendor = "AULA"

[matcher]
# 0x0C45 == Sonix Technology (NOT SinoWealth, despite the AULA brand).
# Confirmed from capture: config traffic is on interface 3.
vid = 0x0c45
pid = 0x800a
interface = 3

[driver]
# The Sonix RGB protocol is DECODED and hardcoded in crates/forge-drivers/src/sonix
# (SET_REPORT Feature, report id 0, 64-byte reports on interface 3; 8 reports of
# 16× [led_index,R,G,B]). No variant knobs needed.
family = "sonix"

[provenance]
captured_by = "WoollyAnders"
captured_on = "2026-07-01"
firmware_revision = ""
capture_files = ["captures/aula-f108-pro/04-connect-esc-red (connect + esc red/green)"]
notes = "Per-key RGB decoded from capture and PROVEN on hardware via forge-cli (effect-path streaming). All 104 led_index values mapped + confirmed empirically with `forge-cli probe` (keymap-probe.txt)."

# --- RGB: 104 per-key LEDs ---------------------------------------------------
[[capabilities]]
kind = "rgb"
mode = "per_key"
max_brightness = 255
color_order = "RGB"

# Built-in onboard animations — CONFIRMED by empirical sweep (forge-cli /
# f108_effect_select.py --sweep). The device selects an effect by a single
# command whose byte0 is the effect id (1-based); the driver uses each effect's
# POSITION here + 1 as that id, so THIS ORDER MUST MATCH the device (id 1..18).
# speed/brightness are device levels 1..5. color_list marks effects that take a
# single custom color (decoded from capture 08: a `[id] 00 R G B …` command); the
# rainbow effects (colorful/spectrum/outward/scrolling/rolling/rotating) omit it.
effects = [
  { id = "static", name = "Static", params = [{ type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }] },
  { id = "single_on", name = "Single On", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "single_off", name = "Single Off", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "glittering", name = "Glittering", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "falling", name = "Falling", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "colorful", name = "Colorful", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }] },
  { id = "breathe", name = "Breathe", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }] },
  { id = "spectrum", name = "Spectrum", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }] },
  { id = "outward", name = "Outward", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }] },
  { id = "scrolling", name = "Scrolling", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "direction" }] },
  { id = "rolling", name = "Rolling", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "direction" }] },
  { id = "rotating", name = "Rotating", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "direction" }] },
  { id = "explode", name = "Explode", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "launch", name = "Launch", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "ripples", name = "Ripples", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "flowing", name = "Flowing", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "pulsating", name = "Pulsating", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
  { id = "tilt", name = "Tilt", params = [{ type = "speed", min = 1, max = 5, default = 3 }, { type = "brightness", min = 1, max = 5, default = 5 }, { type = "color_list", max = 1 }, { type = "randomize" }] },
]

[capabilities.layout]
# x/y/w/h in key units (1.0 == one key). Physical positions traced from the F108
# Pro V3. The knob + LCD are chassis elements (UI), not keys.
# ⚠️ led_index = the device LED-buffer position (the driver sends [led_index,R,G,B]).
# CONFIRMED: every led_index below was mapped empirically on hardware by lighting
# each index one at a time and recording the physical key (`forge-cli probe`).
# The map is NOT a simple row/column function (e.g. W=39/0x27, X=75/0x4b,
# num-=122/0x7a, num+=123/0x7b). All 104 keys confirmed on hardware.
matrix_size = [6, 22]
keys = [
    # Function row
    { id = "KC_ESC", label = "Esc", x = 0.0, y = 0.0, led_index = 1 },
    { id = "KC_F1", label = "F1", x = 2.0, y = 0.0, led_index = 2 },
