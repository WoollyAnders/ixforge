name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — lib crates (hardware-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      # The hardware-free crates: no hidapi (C lib), no platform input deps.
      - name: Clippy (-D warnings)
        run: >
          cargo clippy
          -p forge-core -p forge-profiles -p forge-drivers -p forge-registry -p forge-macro
          --all-targets -- -D warnings

      - name: Test
        run: |
          cargo test -p forge-core -p forge-profiles -p forge-drivers -p forge-registry -p forge-macro
          cargo test -p forge-transport --no-default-features

  deny:
    name: License policy (clean-room guardrail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources

  app:
    name: Build app + CLI + front end (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri + HID system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev librsvg2-dev libudev-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable

      - name: Install front-end deps
        run: corepack pnpm -C app install --frozen-lockfile
      - name: Typecheck + build front end
        run: |
          corepack pnpm -C app exec tsc --noEmit
          corepack pnpm -C app build
      # Compiles the hidapi backend (forge-cli) and the full Tauri app, embedding
      # the freshly built front end. Respects Cargo.lock (which pins `time` to a
      # version compatible with tauri's `cookie` dep).
      - name: Build Rust app + CLI
        run: cargo build -p forge-app -p forge-cli

  # Windows release builds (signed installer) are added later; see the plan.
  # runs-on: windows-latest → pnpm -C app tauri build
